id: network-credentials
name: "Network & Credential Exposure Rules"
version: "1.0.0"
description: "Detects credential exposure, suspicious network activity, and data exfiltration patterns"
author: "shellguard"
tags:
  - builtin
  - network
  - credentials

rules:
  # ── Credentials in Commands ────────────────────────────────────────────────

  - id: net-001
    name: "Credentials in curl/wget"
    description: "Username:password credentials passed on the command line (visible in process list)"
    severity: high
    tags: [credential_exposure, network]
    match:
      mode: regex
      pattern: '(curl|wget)\s+.*(-u\s*\S+:\S+|--user\s+\S+:\S+)'
    remediation: "Use .netrc or environment variables instead of passing credentials on the command line."

  - id: net-002
    name: "Hardcoded GitHub Token"
    description: "GitHub personal access token or fine-grained token hardcoded in script"
    severity: critical
    tags: [credential_exposure, github]
    match:
      mode: regex
      pattern: '(GITHUB_TOKEN|GH_TOKEN)\s*=\s*gh[pousr]_[A-Za-z0-9]{36,}'

  - id: net-003
    name: "GitHub Classic Token"
    description: "GitHub classic personal access token pattern"
    severity: critical
    tags: [credential_exposure, github]
    match:
      mode: regex
      pattern: '\bghp_[A-Za-z0-9]{36}\b'

  - id: net-004
    name: "Hardcoded Private Key Material"
    description: "PEM private key header detected in script"
    severity: critical
    tags: [credential_exposure, tls]
    match:
      mode: regex
      pattern: '-----BEGIN\s+(RSA|EC|DSA|OPENSSH|PRIVATE)\s+PRIVATE\s+KEY-----'
    remediation: "Private key material must never be embedded in scripts."

  - id: net-005
    name: "Hardcoded Bearer Token"
    description: "An Authorization: Bearer token is hardcoded"
    severity: high
    tags: [credential_exposure]
    match:
      mode: regex
      pattern: 'Authorization:\s*Bearer\s+[A-Za-z0-9\-._~+/]{20,}'
      flags: [case_insensitive]

  - id: net-006
    name: "Hardcoded Basic Auth"
    description: "HTTP Basic auth credentials hardcoded in a header"
    severity: high
    tags: [credential_exposure]
    match:
      mode: regex
      pattern: 'Authorization:\s*Basic\s+[A-Za-z0-9+/=]{10,}'
      flags: [case_insensitive]

  - id: net-007
    name: "Certificate/Key File Search"
    description: "Searching for certificate or private key files across the filesystem"
    severity: medium
    tags: [credential_theft, reconnaissance]
    match:
      mode: regex
      pattern: 'find\s+/\s+.*-name\s+["\']?\*\.(pem|key|pfx|p12|jks|keystore)["\']?'

  # ── Network Reconnaissance ─────────────────────────────────────────────────

  - id: net-008
    name: "Network Port Scan (nmap)"
    description: "nmap network scanner invocation"
    severity: low
    tags: [network_scan, reconnaissance]
    match:
      mode: regex
      pattern: '\bnmap\s+'
    remediation: "Port scanning without authorization may violate terms of service or be illegal."

  - id: net-009
    name: "Aggressive Network Scan (masscan)"
    description: "masscan high-speed port scanner — can scan the entire internet"
    severity: medium
    tags: [network_scan, reconnaissance]
    match:
      mode: regex
      pattern: '\bmasscan\s+'
    remediation: "masscan can scan millions of IPs per second. Use only with proper authorization."

  - id: net-010
    name: "Firewall Rule Modification"
    description: "Modifying iptables, nftables, or ufw firewall rules"
    severity: medium
    tags: [network, firewall]
    match:
      mode: regex
      pattern: '\b(iptables|ip6tables|nftables|ufw)\s+(-A|-I|-D|-F|--add|--delete|--flush)\s+'
    remediation: "Verify firewall rule changes are intentional and appropriate."

  - id: net-011
    name: "Disable Firewall"
    description: "Stopping or disabling the firewall entirely"
    severity: high
    tags: [network, firewall]
    match:
      mode: regex
      pattern: '(ufw\s+disable|systemctl\s+(stop|disable)\s+(ufw|firewalld|iptables)|iptables\s+-F\s*&&\s*iptables\s+-X)'

  # ── Data Exfiltration ──────────────────────────────────────────────────────

  - id: net-012
    name: "DNS Exfiltration Pattern"
    description: "Encoding data into DNS queries (common C2/exfiltration technique)"
    severity: high
    tags: [data_exfiltration, network, c2]
    match:
      mode: regex
      pattern: '(dig|nslookup|host)\s+.*\$(.*|base64|xxd|od)'
    references:
      - https://attack.mitre.org/techniques/T1048/001/

  - id: net-013
    name: "Suspicious Outbound curl POST"
    description: "curl POSTing data to an external URL (possible data exfiltration)"
    severity: medium
    tags: [data_exfiltration, network]
    match:
      mode: regex
      pattern: 'curl\s+.*(-X\s+POST|--data|-d\s+[^-])\s+https?://'

  - id: net-014
    name: "Curl with Insecure Flag"
    description: "curl -k or --insecure disables TLS certificate verification"
    severity: medium
    tags: [network, tls]
    match:
      mode: regex
      pattern: 'curl\s+.*(-k\b|--insecure)'
    remediation: "Disabling TLS verification allows MITM attacks. Only use in testing environments."

  # ── AWS/Cloud Metadata ─────────────────────────────────────────────────────

  - id: net-015
    name: "AWS Instance Metadata Access"
    description: "Accessing the EC2 instance metadata service (can expose credentials in cloud environments)"
    severity: medium
    tags: [cloud, aws, credential_theft]
    match:
      mode: regex
      pattern: '169\.254\.169\.254/latest/(meta-data|user-data|dynamic|credentials)'
    remediation: "IMDSv1 access to instance metadata can expose IAM credentials. Ensure IMDSv2 is required."
    references:
      - https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/instancedata-data-retrieval.html

  - id: net-016
    name: "GCP Metadata Service Access"
    description: "Accessing Google Cloud instance metadata (can expose service account tokens)"
    severity: medium
    tags: [cloud, gcp, credential_theft]
    match:
      mode: regex
      pattern: 'metadata\.google\.internal|169\.254\.169\.254/computeMetadata'

  - id: net-017
    name: "Azure IMDS Access"
    description: "Accessing Azure Instance Metadata Service"
    severity: medium
    tags: [cloud, azure, credential_theft]
    match:
      mode: regex
      pattern: '169\.254\.169\.254/metadata/instance|169\.254\.169\.254/metadata/identity'
